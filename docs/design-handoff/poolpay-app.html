<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PoolPay — the app, end-to-end</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="poolpay/shell-styles.css?v=6">
<style>
  html, body { margin: 0; padding: 0; font-family: "Geist", ui-sans-serif, system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="poolpay/design-canvas.jsx"></script>
<script type="text/babel" src="poolpay/lucide.jsx"></script>
<script type="text/babel" src="poolpay/ios-frame.jsx"></script>
<script type="text/babel" src="poolpay/shell.jsx"></script>
<script type="text/babel" src="poolpay/member-desktop.jsx"></script>
<script type="text/babel" src="poolpay/member-mobile.jsx"></script>
<script type="text/babel" src="poolpay/admin-desktop.jsx"></script>
<script type="text/babel" src="poolpay/admin-mobile.jsx"></script>
<script type="text/babel" src="poolpay/super-desktop.jsx"></script>
<script type="text/babel" src="poolpay/whatsapp-story.jsx"></script>
<script type="text/babel" src="poolpay/missing-screens.jsx"></script>

<script type="text/babel">
  const { createRoot, useState, useEffect } = (() => ({ createRoot: ReactDOM.createRoot, useState: React.useState, useEffect: React.useEffect }))();

  // ──────────────────────────────────────────────────────────────
  // Tweaks — status-row treatment across all tables
  // The user has been looking at the old dashboard tables where
  // gradient washes double as status indicators. Expose the knobs.
  // ──────────────────────────────────────────────────────────────
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "rowStyle": "gradient",
    "tintStrength": 14,
    "tintReach": 55,
    "barWidth": 3,
    "density": 12
  }/*EDITMODE-END*/;

  function applyTweaks(t) {
    const r = document.documentElement;
    r.setAttribute('data-row-style', t.rowStyle);
    r.style.setProperty('--row-tint-a', t.tintStrength + '%');
    r.style.setProperty('--row-tint-b', t.tintReach + '%');
    r.style.setProperty('--row-bar', t.barWidth + 'px');
    r.style.setProperty('--row-density-py', t.density + 'px');
    // Propagate theme: to <html> (for canvas/mobile-frame/tweaks-panel overrides)
    // AND to every .vp.d2 root (where the token variants live).
    r.setAttribute('data-theme', t.theme);
    document.querySelectorAll('.d2').forEach(el => el.setAttribute('data-theme', t.theme));
    document.querySelectorAll('.mobile-frame').forEach(el => el.setAttribute('data-theme', t.theme));
  }
  applyTweaks(TWEAK_DEFAULTS);
  // Re-apply whenever new .vp.d2 nodes mount (each artboard renders one)
  new MutationObserver(() => {
    const theme = document.documentElement.getAttribute('data-theme') || 'light';
    document.querySelectorAll('.d2:not([data-theme]), .mobile-frame:not([data-theme])').forEach(el => el.setAttribute('data-theme', theme));
  }).observe(document.body, { subtree: true, childList: true });

  function TweaksPanel() {
    const [t, setT] = useState(TWEAK_DEFAULTS);
    const [on, setOn] = useState(false);
    useEffect(() => {
      function onMsg(e) {
        if (e.data?.type === '__activate_edit_mode') setOn(true);
        if (e.data?.type === '__deactivate_edit_mode') setOn(false);
      }
      window.addEventListener('message', onMsg);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);
    useEffect(() => { applyTweaks(t); }, [t]);

    function set(k, v) {
      const next = { ...t, [k]: v };
      setT(next);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    }

    if (!on) return null;
    const mono = { fontFamily: '"Geist Mono", ui-monospace, monospace' };
    const isDark = t.theme === 'dark';
    const label = { fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: isDark ? 'rgba(244,238,223,0.55)' : 'rgba(0,0,0,0.55)', ...mono, marginBottom: 6, display: 'flex', justifyContent: 'space-between' };
    const btnOn  = { background: isDark ? '#F4EEDF' : '#2B2416', color: isDark ? '#1A1512' : '#FAF6ED' };
    const btnOff = { background: isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.05)', color: isDark ? '#F4EEDF' : '#2B2416' };

    return (
      <div className="tweaks-panel" style={{ position: 'fixed', bottom: 20, right: 20, width: 280, background: isDark ? '#221d19' : '#FAF6ED', color: isDark ? '#F4EEDF' : '#2B2416', border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.12)'}`, borderRadius: 14, boxShadow: '0 20px 50px -10px rgba(0,0,0,0.25)', padding: 16, zIndex: 1000, fontFamily: 'Geist, system-ui, sans-serif' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ fontSize: 13, fontWeight: 600 }}>Tweaks</div>
          <div style={{ fontSize: 10, ...mono, color: isDark ? 'rgba(244,238,223,0.5)' : 'rgba(0,0,0,0.5)' }}>global appearance</div>
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={label}><span>Theme</span></div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            {[
              { k: 'light', l: 'Light' },
              { k: 'dark',  l: 'Dark' },
            ].map(o => (
              <button key={o.k} onClick={() => set('theme', o.k)} style={{
                padding: '7px 10px', borderRadius: 8, fontSize: 12, fontWeight: 500,
                ...(t.theme === o.k ? btnOn : btnOff),
                border: 'none', cursor: 'pointer', textAlign: 'left',
              }}>{o.l}</button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={label}><span>Row variant</span></div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            {[
              { k: 'gradient', l: 'Gradient' },
              { k: 'bar',      l: 'Bar only' },
              { k: 'flat',     l: 'Flat wash' },
              { k: 'none',     l: 'Pill only' },
            ].map(o => (
              <button key={o.k} onClick={() => set('rowStyle', o.k)} style={{
                padding: '7px 10px', borderRadius: 8, fontSize: 12, fontWeight: 500,
                ...(t.rowStyle === o.k ? btnOn : btnOff),
                border: 'none', cursor: 'pointer', textAlign: 'left',
              }}>{o.l}</button>
            ))}
          </div>
        </div>

        {[
          { k: 'tintStrength', l: 'Tint strength', min: 0, max: 40, suf: '%' },
          { k: 'tintReach',    l: 'Tint reach',    min: 10, max: 90, suf: '%' },
          { k: 'barWidth',     l: 'Bar width',     min: 0, max: 8, suf: 'px' },
          { k: 'density',      l: 'Row padding',   min: 6, max: 20, suf: 'px' },
        ].map(s => (
          <div key={s.k} style={{ marginBottom: 10 }}>
            <div style={label}><span>{s.l}</span><span style={mono}>{t[s.k]}{s.suf}</span></div>
            <input type="range" min={s.min} max={s.max} value={t[s.k]} onChange={e => set(s.k, +e.target.value)}
              style={{ width: '100%', accentColor: '#E07B5F' }}/>
          </div>
        ))}

        <div style={{ ...mono, fontSize: 10, color: isDark ? 'rgba(244,238,223,0.45)' : 'rgba(0,0,0,0.45)', marginTop: 12, lineHeight: 1.4 }}>
          Affects every table row with <code style={{ background: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)', padding: '1px 4px', borderRadius: 3 }}>.status-row</code> — receipts, payments, groups, admins, WA links.
        </div>
      </div>
    );
  }

  function Frame({ w, h, bg = '#fff', children }) {
    return <div style={{ width: w, height: h, overflow: 'hidden', background: bg }}>{children}</div>;
  }
  function MFrame({ children }) {
    // Mobile web viewport wrapper — bg is set via CSS (.mobile-frame) so
    // light/dark theme can override it.
    return <div className="mobile-frame" style={{ width: 420, height: 880, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 15, transition: 'background .2s' }}>{children}</div>;
  }

  const DW = 1280, DH = 820;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="intro" title="PoolPay · Direction B — the full product" subtitle="Member, admin (scoped), super-admin. Desktop and mobile (iOS, PWA target). WhatsApp ingestion storyboard. Single shell, role-filtered. Counts: sidebar = cross-group; inside a group = scoped.">
        </DCSection>

        {/* Member — Desktop */}
        <DCSection id="mem-d" title="Member · desktop" subtitle="Home → Pool detail → Pay flow → Inbox → Profile. This is where PoolPay lives most of the day.">
          <DCArtboard id="mem-d-home"    label="1 · Home"            width={DW} height={DH}><Frame w={DW} h={DH}><MD_Home/></Frame></DCArtboard>
          <DCArtboard id="mem-d-pool"    label="2 · Pool detail"     width={DW} height={DH}><Frame w={DW} h={DH}><MD_Pool/></Frame></DCArtboard>
          <DCArtboard id="mem-d-pay"     label="3 · Pay flow"        width={DW} height={DH}><Frame w={DW} h={DH}><MD_Pay/></Frame></DCArtboard>
          <DCArtboard id="mem-d-inbox"   label="4 · Inbox"           width={DW} height={DH}><Frame w={DW} h={DH}><MD_Inbox/></Frame></DCArtboard>
          <DCArtboard id="mem-d-profile" label="5 · Profile & Settings (Change password)" width={DW} height={DH}><Frame w={DW} h={DH}><MD_Profile/></Frame></DCArtboard>
        </DCSection>

        {/* Member — Mobile web */}
        <DCSection id="mem-m" title="Member · mobile web (responsive)" subtitle="Same web app at a phone viewport (390×844). Not a native iOS app — the PWA home-screen install is a later concern. Top app bar + bottom tab bar, same palette and type as desktop.">
          <DCArtboard id="mem-m-home"    label="1 · Home"            width={420} height={880}><MFrame><MM_Home/></MFrame></DCArtboard>
          <DCArtboard id="mem-m-pool"    label="2 · Pool detail"     width={420} height={880}><MFrame><MM_Pool/></MFrame></DCArtboard>
          <DCArtboard id="mem-m-pay"     label="3 · Pay flow"        width={420} height={880}><MFrame><MM_Pay/></MFrame></DCArtboard>
          <DCArtboard id="mem-m-inbox"   label="4 · Inbox"           width={420} height={880}><MFrame><MM_Inbox/></MFrame></DCArtboard>
          <DCArtboard id="mem-m-profile" label="5 · Profile"         width={420} height={880}><MFrame><MM_Profile/></MFrame></DCArtboard>
        </DCSection>

        {/* Admin — Desktop */}
        <DCSection id="adm-d" title="Admin (scoped) · desktop" subtitle="Signal-driven landing: pending receipts → queue; empty → member home with an inbox-clear pill. Group page holds Members / Cycles / Payments / Receipts / Settings.">
          <DCArtboard id="adm-d-receipts" label="1 · Receipts queue (routed on login)"  width={DW} height={DH}><Frame w={DW} h={DH}><AD_Receipts/></Frame></DCArtboard>
          <DCArtboard id="adm-d-empty"    label="2 · Empty queue → member home"         width={DW} height={DH}><Frame w={DW} h={DH}><AD_Empty/></Frame></DCArtboard>
          <DCArtboard id="adm-d-grp-ov"   label="3 · Group · Overview"                  width={DW} height={DH}><Frame w={DW} h={DH}><AD_Group tab="overview"/></Frame></DCArtboard>
          <DCArtboard id="adm-d-grp-mem"  label="4 · Group · Members"                   width={DW} height={DH}><Frame w={DW} h={DH}><AD_Group tab="members"/></Frame></DCArtboard>
          <DCArtboard id="adm-d-grp-cyc"  label="5 · Group · Cycles"                    width={DW} height={DH}><Frame w={DW} h={DH}><AD_Group tab="cycles"/></Frame></DCArtboard>
          <DCArtboard id="adm-d-grp-pay"  label="6 · Group · Payments"                  width={DW} height={DH}><Frame w={DW} h={DH}><AD_Group tab="payments"/></Frame></DCArtboard>
          <DCArtboard id="adm-d-grp-rec"  label="7 · Group · Receipts (scoped)"         width={DW} height={DH}><Frame w={DW} h={DH}><AD_Group tab="receipts"/></Frame></DCArtboard>
          <DCArtboard id="adm-d-grp-set"  label="8 · Group · Settings"                  width={DW} height={DH}><Frame w={DW} h={DH}><AD_Group tab="settings"/></Frame></DCArtboard>
        </DCSection>

        {/* Admin — Mobile */}
        <DCSection id="adm-m" title="Admin (scoped) · mobile (triage only)" subtitle="Admins triage between tasks — from WhatsApp alerts into the queue, then into a group to skim state. Configuration stays desktop.">
          <DCArtboard id="adm-m-receipts" label="1 · Receipts queue"   width={420} height={880}><MFrame><AM_Receipts/></MFrame></DCArtboard>
          <DCArtboard id="adm-m-group"    label="2 · Group · read-only tabs" width={420} height={880}><MFrame><AM_Group/></MFrame></DCArtboard>
        </DCSection>

        {/* Super-admin — Desktop */}
        <DCSection id="sup-d" title="Super-admin · desktop only" subtitle="Project-owner surface: Groups, Admins, WhatsApp links. Create-then-grant the admin in one atomic form; reveal temp credentials once; no fake email invites until delivery channel lands.">
          <DCArtboard id="sup-d-receipts" label="1 · Receipts · system-wide"              width={DW} height={DH}><Frame w={DW} h={DH}><SD_Receipts/></Frame></DCArtboard>
          <DCArtboard id="sup-d-groups"   label="2 · Groups · list (CRUD)"                width={DW} height={DH}><Frame w={DW} h={DH}><SD_Groups/></Frame></DCArtboard>
          <DCArtboard id="sup-d-grp-det"  label="3 · Groups · detail"                     width={DW} height={DH}><Frame w={DW} h={DH}><SD_GroupDetail/></Frame></DCArtboard>
          <DCArtboard id="sup-d-admins"   label="4 · Admins · list"                       width={DW} height={DH}><Frame w={DW} h={DH}><SD_Admins/></Frame></DCArtboard>
          <DCArtboard id="sup-d-admin-add" label="5 · Admins · Add admin (create + grant)" width={DW} height={DH}><Frame w={DW} h={DH}><SD_Admins withModal/></Frame></DCArtboard>
          <DCArtboard id="sup-d-wa"       label="6 · WhatsApp links · list"               width={DW} height={DH}><Frame w={DW} h={DH}><SD_WhatsApp/></Frame></DCArtboard>
        </DCSection>

        {/* WhatsApp storyboard */}
        <DCSection id="wa" title="WhatsApp ingestion · storyboard" subtitle="3 panels. Member sends receipt → bot matches by phone number → admin confirms visually. PoolPay does not OCR — humans verify money moved.">
          <DCArtboard id="wa-story" label="WhatsApp → bot ack → admin queue" width={1440} height={520}><Frame w={1440} h={520} bg="#FAF8F3"><WAStoryboard/></Frame></DCArtboard>
        </DCSection>

        {/* Auth */}
        <DCSection id="auth" title="Auth · sign-in, sign-up, recovery" subtitle="Single centered layout. Google + Apple SSO above email/password. WhatsApp OTP for recovery. Phone-first sign-up via invite.">
          <DCArtboard id="auth-signin"  label="1 · Sign in"                width={DW} height={DH}><Frame w={DW} h={DH}><AuthSignIn/></Frame></DCArtboard>
          <DCArtboard id="auth-signup"  label="2 · Sign up via invite"     width={DW} height={DH}><Frame w={DW} h={DH}><AuthSignUp/></Frame></DCArtboard>
          <DCArtboard id="auth-otp"     label="3 · OTP / forgot password"  width={DW} height={DH}><Frame w={DW} h={DH}><AuthForgot/></Frame></DCArtboard>
          <DCArtboard id="auth-mobile"  label="4 · Mobile sign-in"          width={420} height={880}><MFrame><MM_SignIn/></MFrame></DCArtboard>
        </DCSection>

        {/* Errors */}
        <DCSection id="err" title="Errors & offline" subtitle="Plain, on-brand. No illustrations — kicker / heading / body / two actions.">
          <DCArtboard id="err-404"     label="1 · 404 not found"  width={DW} height={DH}><Frame w={DW} h={DH}><Err404/></Frame></DCArtboard>
          <DCArtboard id="err-500"     label="2 · 500 server error" width={DW} height={DH}><Frame w={DW} h={DH}><Err500/></Frame></DCArtboard>
          <DCArtboard id="err-offline" label="3 · Offline"        width={DW} height={DH}><Frame w={DW} h={DH}><ErrOffline/></Frame></DCArtboard>
        </DCSection>

        {/* Empty states */}
        <DCSection id="empty" title="Empty states" subtitle="First-time member home, empty inbox, empty admins (super-admin). Empty receipts queue is in the admin section above (`adm-d-empty`).">
          <DCArtboard id="empty-member" label="1 · Member · no pools yet"  width={DW} height={DH}><Frame w={DW} h={DH}><EmptyMember/></Frame></DCArtboard>
          <DCArtboard id="empty-inbox"  label="2 · Inbox · all caught up"  width={DW} height={DH}><Frame w={DW} h={DH}><EmptyInbox/></Frame></DCArtboard>
          <DCArtboard id="empty-admins" label="3 · Super-admin · no admins" width={DW} height={DH}><Frame w={DW} h={DH}><EmptyAdmins/></Frame></DCArtboard>
        </DCSection>

        {/* Modals */}
        <DCSection id="modals" title="Modals & confirms" subtitle="Centered modal pattern. Backdrop blurs the underlying app. Footer has left-aligned context + right-aligned action stack.">
          <DCArtboard id="mod-pay"     label="1 · Pay · confirm"           width={DW} height={DH}><Frame w={DW} h={DH}><ModalPayConfirm/></Frame></DCArtboard>
          <DCArtboard id="mod-receipt" label="2 · Receipt · detail (admin)" width={DW} height={DH}><Frame w={DW} h={DH}><ModalReceiptDetail/></Frame></DCArtboard>
          <DCArtboard id="mod-delete"  label="3 · Destructive confirm"     width={DW} height={DH}><Frame w={DW} h={DH}><ModalDeleteConfirm/></Frame></DCArtboard>
          <DCArtboard id="mod-cycle"   label="4 · Start new cycle (admin)"  width={DW} height={DH}><Frame w={DW} h={DH}><ModalCreateCycle/></Frame></DCArtboard>
          <DCArtboard id="mod-group"   label="5 · Create pool (super-admin)" width={DW} height={DH}><Frame w={DW} h={DH}><ModalCreateGroup/></Frame></DCArtboard>
        </DCSection>

        {/* Loading skeletons */}
        <DCSection id="loading" title="Loading skeletons" subtitle="Shimmer-tinted blocks at the size of the real elements. Show on initial route load, not on subsequent in-page state changes.">
          <DCArtboard id="load-home"  label="1 · Home · skeleton"           width={DW} height={DH}><Frame w={DW} h={DH}><LoadingHome/></Frame></DCArtboard>
          <DCArtboard id="load-table" label="2 · Receipts queue · skeleton" width={DW} height={DH}><Frame w={DW} h={DH}><LoadingTable/></Frame></DCArtboard>
        </DCSection>

        {/* Toasts + form states */}
        <DCSection id="system" title="Feedback & form states" subtitle="Reference artboards — every variant of toast, banner, input, and button in one place for the implementer.">
          <DCArtboard id="sys-toasts" label="1 · Toasts & banners" width={DW} height={DH}><Frame w={DW} h={DH}><ToastsScene/></Frame></DCArtboard>
          <DCArtboard id="sys-forms"  label="2 · Form states · reference" width={DW} height={DH}><Frame w={DW} h={DH}><FormStatesRef/></Frame></DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  createRoot(document.getElementById('root')).render(<><App/><TweaksPanel/></>);
</script>
</body>
</html>
